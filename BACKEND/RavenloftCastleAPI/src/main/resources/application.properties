spring.application.name=RavenloftCastleAPI
server.port=8080

# =============================================
# MySQL database config
# Cambia 'root' en spring.datasource.password por tu contrasena de MySQL
# La base de datos 'ravenloft_db' se crea automaticamente si no existe
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/ravenloft_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / Hibernate config
# ddl-auto=none  -> Hibernate NO toca las tablas, las gestiona el script SQL
# ddl-auto=update -> descomentar solo si NO usas el script SQL manualmente
# =============================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
